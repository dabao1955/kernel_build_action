name: Biome Lint

on:
  push:
    branches: [main]
    paths:
      - 'src/**/*.ts'
      - 'biome.json'
  pull_request:
    branches: [main]
    paths:
      - 'src/**/*.ts'
      - 'biome.json'

jobs:
  biome:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Biome
        run: yarn biome
